# One service on the shared `edge` network. The edge proxy (caddy-docker-proxy)
# lives in the separate infra repo; it terminates TLS for every app on the box
# and routes to this container by the `caddy.*` labels below — no central
# Caddyfile to edit when apps come and go.
#
# The image is built and pushed to GHCR by CI; the server only pulls it.
# Deploy = `docker compose pull && docker compose up -d` (done by the deploy
# workflow over SSH).
services:
  mcp:
    image: ghcr.io/mihaildolghintev/chic_mcp:${TAG:-latest}
    restart: unless-stopped
    environment:
      MCP_TRANSPORT: http
      MOYSKLAD_TOKEN: ${MOYSKLAD_TOKEN:?set MOYSKLAD_TOKEN in .env}
      MCP_BEARER_TOKEN: ${MCP_BEARER_TOKEN:?set MCP_BEARER_TOKEN in .env}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://mcp.chic.md}
      OAUTH_PASSWORD: ${OAUTH_PASSWORD:?set OAUTH_PASSWORD in .env}
      CACHE_DB: /app/data/cache.db
      LISTEN_ADDR: ":8080"
    volumes:
      # Persistent SQLite response cache (survives restarts).
      - mcp-data:/app/data
    networks:
      - edge
    # caddy-docker-proxy reads these: serve mcp.chic.md and reverse-proxy it to
    # this container's :8080. TLS (Let's Encrypt) is automatic. The port is the
    # container's internal port on the edge network — nothing is published to
    # the host.
    labels:
      caddy: mcp.chic.md
      caddy.reverse_proxy: "{{upstreams 8080}}"

volumes:
  mcp-data:

# Created once on the server (`docker network create edge`) and shared by the
# edge proxy and every app. Internal service-to-service calls (e.g. a Telegram
# backend hitting http://mcp:8080/mcp) stay on this network, off the public net.
networks:
  edge:
    external: true
    name: edge
