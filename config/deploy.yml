# Kamal 2 deployment: one Go binary on the Hetzner box, fronted by
# kamal-proxy which owns 80/443 and the Let's Encrypt certificate for
# bot.chic.md. Deploys run from CI when a GitHub Release is published
# (.github/workflows/deploy.yml); manual `kamal deploy` from the laptop
# still works via .envrc (first time: `kamal setup`).
service: chic

image: mihaildolghintev/chic

servers:
  web:
    - 204.168.131.104

proxy:
  ssl: true
  host: bot.chic.md
  app_port: 8080
  healthcheck:
    # The app serves /healthz (kamal-proxy's default probe path is /up).
    path: /healthz

registry:
  server: ghcr.io
  username: mihaildolghintev
  # GitHub PAT with read:packages + write:packages. Kamal pushes from the
  # deploying machine (CI runner or laptop) and logs the server in with the
  # same credential, so the GHCR package can stay private.
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  # The box is x86. Native build on CI runners; cross-build from the Apple
  # Silicon laptop (pure-Go binary, so no CGO cross-compilation pain).
  arch: amd64
  args:
    VERSION: <%= `git describe --tags --always`.strip %>

env:
  clear:
    PUBLIC_BASE_URL: https://bot.chic.md
    LISTEN_ADDR: ":8080"
    CACHE_DB: /data/cache.db
    APP_DB: /data/app.db
    LOG_FORMAT: json
  secret:
    - TELEGRAM_BOT_TOKEN
    - TELEGRAM_WEBHOOK_SECRET
    - ALLOWED_USER_IDS
    - MOYSKLAD_TOKEN
    - DEEPSEEK_API_KEY
    # Optional: enables photo understanding. Empty until the GitHub secret is
    # created — the app treats an empty value as "not configured".
    - OPENAI_API_KEY

# Persistent SQLite files (regenerable cache.db + durable app.db with the
# conversation history) survive deploys on a named volume.
volumes:
  - "chic_data:/data"

ssh:
  user: deploy
