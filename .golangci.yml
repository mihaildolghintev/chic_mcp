version: "2"

linters:
  # The default set (errcheck, govet, ineffassign, staticcheck, unused) plus a
  # few high-signal extras.
  enable:
    - bodyclose
    - misspell
  exclusions:
    rules:
      # In tests, unchecked error returns on Write/Close to httptest recorders
      # and response bodies are noise, not bugs.
      - path: _test\.go
        linters:
          - errcheck
          - bodyclose
