name: Deploy

# main is merged freely; production deploys only when a GitHub Release is
# published (checkout below lands on the release tag). workflow_dispatch
# gives a manual "redeploy main now" button.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

# One deploy at a time; never cancel a deploy mid-flight (kamal also holds
# its own lock on the server, this just avoids queued runs colliding).
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # VERSION build arg runs `git describe --tags`

      - name: Load deploy SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      # No known_hosts setup on purpose: net-ssh's default verifier is
      # accept-new, so the fresh runner trusts the host on first connection.
      # Do NOT add an ssh-keyscan step — its probes get rate-limited from
      # runner IPs and a partial key list turns into HostKeyMismatch.
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"

      - name: Install kamal
        run: gem install kamal

      - name: kamal deploy
        env:
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.KAMAL_REGISTRY_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_WEBHOOK_SECRET: ${{ secrets.TELEGRAM_WEBHOOK_SECRET }}
          ALLOWED_USER_IDS: ${{ secrets.ALLOWED_USER_IDS }}
          MOYSKLAD_TOKEN: ${{ secrets.MOYSKLAD_TOKEN }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          # Not created yet — resolves to "" and vision stays disabled until
          # the secret exists. No workflow change needed then.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: kamal deploy
