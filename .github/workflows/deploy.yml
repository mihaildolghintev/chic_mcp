name: Deploy

# main is merged freely; production deploys only when a GitHub Release is
# published (checkout below lands on the release tag). workflow_dispatch
# gives a manual "redeploy main now" button.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

# One deploy at a time; never cancel a deploy mid-flight (kamal also holds
# its own lock on the server, this just avoids queued runs colliding).
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # VERSION build arg runs `git describe --tags`

      - name: Load deploy SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Trust server host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 204.168.131.104 >> ~/.ssh/known_hosts

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"

      - name: Install kamal
        run: gem install kamal

      - name: kamal deploy
        env:
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.KAMAL_REGISTRY_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_WEBHOOK_SECRET: ${{ secrets.TELEGRAM_WEBHOOK_SECRET }}
          ALLOWED_USER_IDS: ${{ secrets.ALLOWED_USER_IDS }}
          MOYSKLAD_TOKEN: ${{ secrets.MOYSKLAD_TOKEN }}
        run: kamal deploy
