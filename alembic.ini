# Alembic config for CLI use (autogenerate / manual revisions), e.g.
#   docker compose run --rm tooling alembic revision --autogenerate -m "add x"
#   docker compose run --rm tooling alembic upgrade head
#
# At app startup migrations run programmatically against the store's own async
# connection (see chic/store/db.py) — that path does not read this file.

[alembic]
script_location = chic/store/migrations
# Sync URL for the CLI (stdlib pysqlite). The app itself uses sqlite+aiosqlite.
sqlalchemy.url = sqlite:///./app.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
